<!doctype html>
<html>
<head>
  <title>SplitSheet</title>

  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="SplitSheet">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#6F8F72">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #dbeafe, #dcfce7);
      color: #0f172a;
      text-align: center;
    }

    .wrap {
      padding: 28px;
    }

    h1 {
      margin: 18px 0 6px;
      font-size: 42px;
      letter-spacing: -0.05em;
    }

    p {
      margin: 0;
      color: #64748b;
      font-size: 17px;
    }

    .frog-button {
      display: inline-block;
      border-radius: 34px;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .frog-button img {
      width: 210px;
      max-width: 70vw;
      border-radius: 32px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .frog-button:active img {
      transform: scale(0.97);
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.16);
    }

    .hint {
      margin-top: 18px;
      font-size: 14px;
      font-weight: 700;
      color: #047857;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <a class="frog-button" href="https://script.google.com/macros/s/AKfycbwJLRu7YYOSGH0zWs2X14_8pRBHTMXVEdQ5tBDA8RcDt-a5fThQOfLUKOe61AbEbr1N/exec">
      <img src="assets/frog-enter.png" alt="Enter SplitSheet">
    </a>

    <h1>SplitSheet</h1>
    <p>Life ledger for Ethan & Kaya</p>
    <div class="hint">Tap the frog to enter</div>
  </main>
</body>
</html>
