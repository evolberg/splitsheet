<!doctype html>
<html>
<head>
  <title>SplitSheet</title>
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="SplitSheet">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#6F8F72">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f6fbff;
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>

</body>
</html>
